<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About — Misha Graphics</title>
  <meta name="description" content="Misha Kerch — motion designer & art director working with AI, After Effects and 3D.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon-mk.svg">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-active="about">
  <div id="site-header"></div>

  <div class="about-hero">
    <h1 id="about-headline"></h1>
  </div>

  <main>
    <div class="about-split">
      <!-- portrait -->
      <div>
        <div class="portrait">
          <div class="portrait__glow"></div>
          <div class="portrait__frame" id="portrait-frame"></div>
        </div>
      </div>

      <!-- name + bio + stats -->
      <div class="bio">
        <div class="bio__name" id="portrait-name"></div>
        <p class="bio__lead" id="bio-lead"></p>
        <div id="bio-body"></div>
        <div class="stats" id="stats"></div>
      </div>
    </div>

    <!-- what I do -->
    <div class="do-band">
      <div class="do-band__inner">
        <div class="mono-label">WHAT I DO</div>
        <div class="do-grid" id="do-grid"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/site.js"></script>
  <script src="assets/js/about.js"></script>
</body>
</html>
